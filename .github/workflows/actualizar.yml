name: Actualizar Resultados Mundial 2026

on:
  schedule:
    # Cada 2 horas durante el torneo (11 jun - 19 jul 2026)
    - cron: '0 */2 * * *'
  workflow_dispatch:
    # Permite ejecutar manualmente desde GitHub Actions

jobs:
  actualizar:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Ejecutar actualización
        run: python actualizar_resultados.py
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          FOOTBALL_API_KEY:     ${{ secrets.FOOTBALL_API_KEY }}
