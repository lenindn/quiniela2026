name: Actualizar Resultados Mundial 2026

on:
  # Reactivado: secrets configurados (FOOTBALL_API_KEY, SUPABASE_URL,
  # SUPABASE_SERVICE_KEY). El script ignora la fase de grupos a proposito
  # (ver FASE_MAP en actualizar_resultados.py) -> solo actua desde 16avos
  # (r32) en adelante, sin riesgo de duplicar los partidos de grupos.
  schedule:
    # Solo durante el torneo (junio-julio) y en la ventana de partidos.
    # Mundial 2026 en Norteamerica: partidos ~12:00-22:00 hora local
    # = aprox 16:00-06:00 UTC. Corre cada 5 min SOLO en esa franja -- es el
    # minimo que permite GitHub Actions para cron programado. football-data.org
    # free tier soporta esto sin problema (limite real: 10 solicitudes/min,
    # aqui hacemos 1 cada 5 min).
    # Horas UTC: 16-23 y 0-6. Meses: 6 (jun) y 7 (jul).
    # Minutos en :02/:07/:12/.../:57 (no en los redondos :00/:15/:30/:45) -- en
    # esos minutos redondos GitHub Actions recibe una avalancha de cron jobs
    # de miles de repos a la vez (todos programan ahi por defecto) y durante
    # picos de carga simplemente descarta la mayoria de esos disparos. Se
    # confirmo en producción: el cron */15 corrio solo 3 veces en 3.5 horas
    # en vez de 14. Corriendo en un minuto "raro" se evita ese atasco.
    # Ajustar si el fixture oficial usa otras franjas horarias.
    - cron: '2-57/5 0-6,16-23 * 6,7 *'
  workflow_dispatch:
    # Permite ejecutar manualmente desde GitHub Actions

jobs:
  actualizar:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Ejecutar actualización
        run: python actualizar_resultados.py
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          FOOTBALL_API_KEY:     ${{ secrets.FOOTBALL_API_KEY }}
